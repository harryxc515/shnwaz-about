name: Deploy to GitHub Pages

# Custom domain DNS is not managed by GitHub Actions.
# Add these A records in your registrar for shnwaz.in:
#   A @ 185.199.108.153
#   A @ 185.199.109.153
#   A @ 185.199.110.153
#   A @ 185.199.111.153
# The repo already includes public/CNAME and the GitHub Pages workflow.

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: DNS reminder
        run: |
          echo "Custom domain DNS for shnwaz.in must be set at your registrar:"
          echo "  A @ 185.199.108.153"
          echo "  A @ 185.199.109.153"
          echo "  A @ 185.199.110.153"
          echo "  A @ 185.199.111.153"
          echo "Also ensure public/CNAME exists with shnwaz.in"

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
